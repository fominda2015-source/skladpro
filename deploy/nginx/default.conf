# HTTP (IP и домен). После certbot: cp deploy/nginx/default-https.conf deploy/nginx/default.conf

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name sklodpro.ru _;

  client_max_body_size 30m;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type text/plain;
  }

  location /api/ {
    proxy_pass http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://api:4000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /acts/ {
    proxy_pass http://api:4000/acts/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://web:80/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /updates/ {
    alias /var/www/updates/;
    autoindex on;
    add_header Cache-Control "no-store";
  }
}

# Порт 443 проброшен в docker-compose, но SSL ещё не настроен.
# Без этого блока браузер на https:// получает ERR_CONNECTION_CLOSED.
server {
  listen 443 default_server;
  listen [::]:443 default_server;
  server_name _;
  ssl_reject_handshake on;
}
