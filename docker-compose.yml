
services:
  db:
    image: postgres:16-alpine
    container_name: skladpro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - skladpro-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: skladpro-api
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      SEED_ON_START: "1"
      SEED_ADMIN_EMAIL: admin@skladpro.local
      SEED_ADMIN_PASSWORD: "1111"
      SEED_ADMIN_NAME: System Admin
    depends_on:
      - db
    command: sh -c "(npm run prisma:migrate:deploy || echo 'migrate:deploy failed, trying db push' && npx prisma db push --skip-generate || echo 'db push failed, continuing'); node dist/scripts/runDataMigrations.js || echo 'data:migrate failed, continuing'; node dist/index.js"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - skladpro-net

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ""
    container_name: skladpro-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - skladpro-net

  nginx:
    image: nginx:1.27-alpine
    container_name: skladpro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot-www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./updates:/var/www/updates
    depends_on:
      - web
      - api
    networks:
      - skladpro-net

volumes:
  db_data:
  uploads_data:

networks:
  skladpro-net:
    driver: bridge
